<footer class="page-footer" id="footer">
  <div class="page-footer__inner">
    <a class="page-footer__logo" href="/">
      <img src="/assets/images/logo_white.png" alt="Logo for Away Lands" title="Away Lands" loading="lazy" decoding="async"/>
    </a>

    <div class="page-footer__section">
      <div class="page-footer__block">
        <h3 class="page-footer__heading">Contact Us</h3>

        <ul class="contact">
          {% for contact in site.footer.contacts %}
            <li>
              <h4 class="contact__heading">{{ contact.label }}</h4>
              <a href="mailto:{{ contact.email }}">{{ contact.email }}</a>
            </li>
          {% endfor %}
        </ul>
      </div>

      <div class="page-footer__block">
        

        
        </div>
      </div>
    </div>

    <div class="instagram-footer">
      <h3 class="page-footer__heading">
        <a href="https://www.instagram.com/amyseder/" target="_blank" rel="noopener noreferrer">
          @AMYSEDER
        </a>
      </h3>
    
      <instafeed></instafeed>
    </div>

    <div style="text-align:center;">
      <span class="page-footer__colophon">
        © Copyright Away Lands |
        <a href="/privacy/" style="color:#ffffff;">Privacy Policy</a>
      </span>
    </div>
  </div>
  
</footer>
