query {
  categories: getBlog {
    categories {
      title
    }
  }
  featuredCategories: getCategoryList {
    items {
      title
      storySet(size: 6) {
        items {
          _contentTypeName
          _enabledAt
          title
          slug
          category {
            title
          }
          tout {
            image {
              path
            }
            dek
          }
        }
      }
    }
  }
  page: getBlog {
    _contentTypeName
    title
    featuredStory {
      _contentTypeName
      _enabledAt
      title
      slug
      category {
        title
      }
      tout {
        image {
          path
        }
        dek
      }
    }
    categories {
      title
    }
    social {
      title
      description
      image {
        path
      }
    }
  }

}
